name: register-me

services:
  email:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: registry
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready -U user -d registry
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: .
    environment:
      DB_URL: postgresql://user:password@db:5432/registry
      REDIS_URL: redis://redis:6379/0
      EMAIL_API_URL: http://email:8025
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      email:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      start_period: 10s
      retries: 10
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.cleanup-unverified.schedule: "0 0 2 * * *"
      ofelia.job-exec.cleanup-unverified.command: "uv run python -m src.jobs.cleanup_unverified"

  scheduler:
    image: mcuadros/ofelia:latest
    command: daemon --docker
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
